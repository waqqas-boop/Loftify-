<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Loftify Music Streaming Application</title>\n    <link rel="stylesheet" href="styles.css">\n</head>\n<body>\n    <div id="app">\n        <header>\n            <h1>Loftify Music Player</h1>\n        </header>\n        <main>\n            <section id="player">\n                <audio id="audio-player" controls></audio>\n                <div id="controls">\n                    <button id="play">Play</button>\n                    <button id="pause">Pause</button>\n                    <button id="next">Next</button>\n                    <button id="previous">Previous</button>\n                </div>\n            </section>\n            <section id="playlist">\n                <h2>Playlist</h2>\n                <ul id="track-list"></ul>\n            </section>\n            <section id="equalizer">\n                <h2>Equalizer</h2>\n                <div id="eq-controls">\n                    <input type="range" min="0" max="100" value="50">\n                </div>\n            </section>\n            <section id="lyrics">\n                <h2>Lyrics</h2>\n                <div id="lyrics-display"></div>\n            </section>\n            <section id="download">\n                <button id="download-track">Download</button>\n            </section>\n        </main>\n    </div>\n    <script src="script.js"></script>\n</body>\n</html>
